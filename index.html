<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHAQ AI — Token Market</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Source+Code+Pro:wght@600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #FFD700;
    --dark: #060918;
    --darker: #0a0e27;
  }

  body {
    font-family: 'Segoe UI', -apple-system, sans-serif;
    color: #fff;
    background:
      radial-gradient(ellipse at top, rgba(255,215,0,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(100,50,200,0.1) 0%, transparent 50%),
      linear-gradient(180deg, var(--dark) 0%, #0f0a1e 50%, var(--darker) 100%);
    min-height: 100vh;
    padding-bottom: 50px;
    overflow-x: hidden;
  }

  /* ===== TOP BAR ===== */
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .topbar-logo {
    font-family: 'Oswald', Impact, sans-serif; font-size: 24px; font-weight: 700;
    letter-spacing: 5px;
    background: linear-gradient(90deg, #FFD700, #FFA500, #FFD700);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .topbar-sub { color: rgba(255,255,255,0.25); font-size: 11px; letter-spacing: 4px; }
  .topbar-right { display: flex; align-items: center; gap: 16px; text-align: right; }
  .market-status { font-size: 9px; letter-spacing: 3px; }
  .market-status.open { color: #7BED9F; }
  .market-status.closed { color: #FF4757; }
  .market-timer {
    font-family: 'Source Code Pro', 'Courier New', monospace;
    font-size: 20px; font-weight: 700; color: var(--gold);
    letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,215,0,0.3);
  }
  .market-label { font-size: 9px; letter-spacing: 2px; color: #a0aec0; }
  .topbar-tag { font-size: 9px; letter-spacing: 3px; color: #4a5568; }

  /* ===== CONTAINER ===== */
  .container { max-width: 1300px; margin: 0 auto; padding: 0 20px; }

  /* ===== FEATURED PACK ===== */
  .stage {
    display: flex; flex-direction: column; align-items: center;
    padding: 50px 0 30px; position: relative;
    background: radial-gradient(ellipse at center top, rgba(255,255,255,0.03), transparent 60%);
  }
  .featured-pack {
    width: 250px; height: 370px; border-radius: 18px; position: relative;
    display: flex; flex-direction: column; align-items: center; justify-content: space-between;
    padding: 28px 20px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.9), inset 0 2px 0 rgba(255,255,255,0.35), inset 0 -3px 8px rgba(0,0,0,0.5);
    transform: perspective(1200px) rotateX(5deg) rotateY(-3deg);
    animation: packFloat 4s ease-in-out infinite;
    transition: all 0.5s ease;
  }
  .featured-pack::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 35%;
    background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, transparent 100%);
    border-radius: 18px 18px 0 0; pointer-events: none;
  }
  .featured-pack::after {
    content: ''; position: absolute; top: 10%; left: -2px; bottom: 10%; width: 4px;
    border-radius: 4px; filter: blur(3px); pointer-events: none;
  }
  .fp-header {
    font-family: 'Oswald', Impact, sans-serif; font-size: 22px; letter-spacing: 5px;
    color: rgba(255,255,255,0.85); text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    position: relative; z-index: 2;
  }
  .fp-emoji { font-size: 80px; position: relative; z-index: 2; }
  .fp-name {
    font-family: 'Oswald', Impact, sans-serif; font-size: 22px; letter-spacing: 2px;
    color: #fff; text-align: center; position: relative; z-index: 2;
  }
  .fp-rarity {
    font-size: 11px; letter-spacing: 5px; margin-top: 4px;
    position: relative; z-index: 2;
  }
  @keyframes packFloat {
    0%, 100% { transform: perspective(1200px) rotateX(5deg) rotateY(-3deg) translateY(0px); }
    50% { transform: perspective(1200px) rotateX(5deg) rotateY(-3deg) translateY(-14px); }
  }

  /* ===== INFO BANNER ===== */
  .info-banner {
    padding: 16px 24px; display: flex; justify-content: space-between; align-items: center;
    margin: 0 0 20px; transition: all 0.5s;
  }
  .ib-name {
    font-family: 'Oswald', Impact, sans-serif; font-size: 20px;
    letter-spacing: 2px; text-transform: uppercase;
  }
  .ib-desc { color: #a0aec0; font-size: 13px; margin-top: 2px; }
  .ib-timer-label { font-size: 9px; letter-spacing: 3px; color: #a0aec0; }
  .ib-timer {
    font-family: 'Source Code Pro', monospace; font-size: 22px; font-weight: 700;
    letter-spacing: 2px;
  }

  /* ===== SEARCH ===== */
  .search-section { text-align: center; margin-bottom: 24px; }
  .search-hint { font-size: 11px; letter-spacing: 4px; color: #4a5568; margin-bottom: 10px; }
  .search-row { display: flex; gap: 8px; max-width: 500px; margin: 0 auto; }
  .search-input {
    flex: 1; background: rgba(0,0,0,0.5); color: #fff;
    border: 2px solid rgba(255,215,0,0.3); border-radius: 30px;
    padding: 14px 24px; font-size: 16px; text-align: center;
    letter-spacing: 4px; font-weight: 700; outline: none;
    text-transform: uppercase; transition: border-color 0.3s;
  }
  .search-input:focus { border-color: var(--gold); }
  .search-input::placeholder { color: rgba(255,255,255,0.25); text-transform: uppercase; }
  .search-btn {
    background: linear-gradient(135deg, rgba(255,215,0,0.25), rgba(255,165,0,0.15));
    color: #fff; border: 2px solid rgba(255,215,0,0.4); border-radius: 30px;
    padding: 14px 28px; font-weight: 800; letter-spacing: 2px; cursor: pointer;
    font-size: 14px; transition: all 0.3s;
  }
  .search-btn:hover { background: linear-gradient(135deg, rgba(255,215,0,0.4), rgba(255,165,0,0.3)); border-color: var(--gold); }
  .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error-msg { color: #FF4757; margin-top: 10px; font-size: 13px; }

  /* ===== SETTINGS ===== */
  .settings { display: flex; gap: 12px; justify-content: center; margin-bottom: 28px; }
  .settings select {
    background: rgba(0,0,0,0.4); color: #fff;
    border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
    padding: 8px 14px; font-size: 12px; letter-spacing: 1px;
    cursor: pointer; outline: none;
  }

  /* ===== PACK GRID ===== */
  .pack-label { text-align: center; font-size: 11px; letter-spacing: 4px; color: #4a5568; margin-bottom: 14px; }
  .pack-grid {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px;
    margin-bottom: 40px;
  }
  @media (max-width: 900px) { .pack-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 550px) { .pack-grid { grid-template-columns: repeat(2, 1fr); } }

  .pack-tile {
    position: relative; cursor: pointer; height: 170px; border-radius: 14px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; padding: 12px 8px; overflow: hidden;
    border: 2px solid rgba(255,255,255,0.1);
    box-shadow: 0 8px 20px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.15);
    transform: perspective(800px) rotateX(6deg);
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .pack-tile::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 45%;
    background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, transparent 100%);
    border-radius: 14px 14px 0 0; pointer-events: none;
  }
  .pack-tile:hover {
    transform: perspective(800px) rotateX(0deg) translateY(-8px) scale(1.04);
    box-shadow: 0 20px 35px rgba(0,0,0,0.7), 0 8px 12px rgba(0,0,0,0.5);
  }
  .pack-tile.selected {
    transform: perspective(800px) rotateX(0deg) translateY(-6px) scale(1.06);
  }
  .pack-tile .info-dot {
    position: absolute; top: 6px; right: 8px; width: 20px; height: 20px; border-radius: 50%;
    background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: #fff; font-style: italic; font-family: serif;
  }
  .pack-emoji { font-size: 36px; position: relative; z-index: 2; }
  .pack-name {
    font-size: 11px; font-weight: 900; letter-spacing: 1.5px; color: #fff;
    text-transform: uppercase; text-align: center; line-height: 1.15;
    text-shadow: 0 2px 4px rgba(0,0,0,0.9); position: relative; z-index: 2;
  }
  .pack-rarity {
    font-size: 9px; letter-spacing: 3px; font-weight: 700;
    text-shadow: 0 1px 2px rgba(0,0,0,0.8); position: relative; z-index: 2;
  }
  .pack-timer {
    font-family: 'Source Code Pro', monospace; font-size: 12px; font-weight: 700;
    color: var(--gold); letter-spacing: 1px; margin-top: 4px;
    text-shadow: 0 0 6px rgba(255,215,0,0.5);
    background: rgba(0,0,0,0.5); padding: 2px 8px; border-radius: 4px;
    position: relative; z-index: 2;
  }

  /* ===== ANALYSIS VIEW ===== */
  .analysis { animation: fadeUp 0.5s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .back-btn {
    background: rgba(255,255,255,0.06); color: #a0aec0;
    border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
    padding: 8px 20px; cursor: pointer; font-size: 13px; letter-spacing: 1px;
    margin-bottom: 16px; transition: all 0.3s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

  .sector-badge {
    text-align: center; padding: 10px 0 6px; letter-spacing: 5px; font-size: 12px; font-weight: 700;
  }

  .target-hero {
    border-radius: 16px; padding: 36px 24px; text-align: center;
    margin: 16px 0 24px;
  }
  .target-label { letter-spacing: 4px; font-size: 11px; }
  .target-ticker {
    font-size: 64px; font-weight: 900; font-family: 'Oswald', Impact, sans-serif;
    letter-spacing: 4px; color: #fff;
  }
  .target-sector { color: #a0aec0; letter-spacing: 2px; font-size: 12px; }

  .metrics-row { display: flex; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
  .metric-card {
    background: rgba(255,255,255,0.04); border-radius: 12px;
    padding: 16px 12px; text-align: center; flex: 1; min-width: 120px;
  }
  .metric-label { font-size: 11px; color: #a0aec0; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
  .metric-value {
    font-size: 26px; font-weight: 900; color: #fff;
    font-family: 'Source Code Pro', monospace;
  }

  .analysis-meta {
    font-size: 11px; color: #4a5568; text-align: center; margin-bottom: 24px; letter-spacing: 1px;
  }
  .analysis-meta b { color: #a0aec0; }

  .tables-row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 30px; }
  .table-section { flex: 1; min-width: 280px; }
  .table-title {
    font-size: 15px; letter-spacing: 2px; margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .table-count { color: #a0aec0; font-weight: 400; font-size: 14px; }
  .table-empty {
    color: #4a5568; font-size: 13px; padding: 20px 0; text-align: center;
    border: 1px dashed rgba(255,255,255,0.1); border-radius: 8px;
  }
  .data-table {
    width: 100%; border-collapse: collapse; font-size: 12px;
    border-radius: 10px; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .data-table th {
    padding: 10px 8px; text-align: right; color: #a0aec0;
    font-weight: 600; letter-spacing: 1px; font-size: 10px;
    background: rgba(255,255,255,0.05);
  }
  .data-table th:first-child { text-align: left; }
  .data-table td {
    padding: 8px; text-align: right; color: #fff;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .data-table td:first-child { text-align: left; font-weight: 800; letter-spacing: 1px; }
  .data-table tr:nth-child(even) { background: rgba(0,0,0,0.2); }

  /* ===== MARQUEE ===== */
  .marquee {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.92); border-top: 2px solid var(--gold);
    padding: 8px 0; overflow: hidden; z-index: 1000;
  }
  .marquee-track {
    display: inline-block; white-space: nowrap;
    animation: marqueeScroll 160s linear infinite;
    color: var(--gold); font-size: 12px; letter-spacing: 1px; font-weight: 600;
  }
  @keyframes marqueeScroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <span style="font-size:28px">🏀</span>
    <span class="topbar-logo">SHAQ AI</span>
    <span class="topbar-sub">TOKEN MARKET</span>
  </div>
  <div class="topbar-right">
    <div>
      <div id="marketStatus" class="market-status closed">○ MARKET CLOSED</div>
      <div id="marketTimer" class="market-timer">--:--:--</div>
      <div id="marketLabel" class="market-label">LOADING</div>
    </div>
    <div class="topbar-tag">FIN 440 · UTAMPA</div>
  </div>
</div>

<!-- MARKET VIEW -->
<div id="marketView" class="container">

  <!-- FEATURED PACK -->
  <div class="stage">
    <div id="featuredPack" class="featured-pack">
      <div class="fp-header">SHAQ AI</div>
      <div id="fpEmoji" class="fp-emoji">💻</div>
      <div>
        <div id="fpName" class="fp-name">TECHNOLOGY</div>
        <div id="fpRarity" class="fp-rarity">DIAMOND</div>
      </div>
    </div>
  </div>

  <!-- INFO BANNER -->
  <div id="infoBanner" class="info-banner">
    <div>
      <div id="ibName" class="ib-name">💻 TECHNOLOGY</div>
      <div id="ibDesc" class="ib-desc">ETF: XLK · DIAMOND</div>
    </div>
    <div style="text-align:right">
      <div class="ib-timer-label">MARKET <span id="ibTimerLabel">OPENS IN</span></div>
      <div id="ibTimer" class="ib-timer">--:--:--</div>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="search-section">
    <div class="search-hint">TYPE A TICKER TO RUN SHAQ ANALYSIS</div>
    <div class="search-row">
      <input id="tickerInput" class="search-input" placeholder="E.G. AAPL" autocomplete="off">
      <button id="analyzeBtn" class="search-btn" onclick="runAnalysis()">ANALYZE</button>
    </div>
    <div id="errorMsg" class="error-msg" style="display:none"></div>
  </div>

  <!-- SETTINGS -->
  <div class="settings">
    <select id="modeSelect">
      <option value="sigma">σ Markowitz</option>
      <option value="beta">β CAPM</option>
    </select>
    <select id="lookbackSelect">
      <option value="6mo">6 Months</option>
      <option value="1y" selected>1 Year</option>
      <option value="2y">2 Years</option>
      <option value="5y">5 Years</option>
    </select>
  </div>

  <!-- PACK GRID -->
  <div class="pack-label">SELECT A PACK</div>
  <div id="packGrid" class="pack-grid"></div>
</div>

<!-- ANALYSIS VIEW -->
<div id="analysisView" class="container analysis" style="display:none"></div>

<!-- MARQUEE -->
<div class="marquee">
  <div id="marqueeTrack" class="marquee-track"></div>
</div>

<script>
// ===== CONFIG =====
// API is served from the same server as this page
const API_URL = window.location.origin;

const SECTORS = [
  { name: "Technology", emoji: "💻", color: "#00D4FF", rarity: "DIAMOND", etf: "XLK", tag: "Tech titans, chipmakers, cloud giants" },
  { name: "Financial Services", emoji: "🏦", color: "#FFD700", rarity: "GOLD", etf: "XLF", tag: "Big banks, payment networks, asset managers" },
  { name: "Healthcare", emoji: "⚕️", color: "#FF4757", rarity: "RUBY", etf: "XLV", tag: "Pharma, biotech, medical devices" },
  { name: "Consumer Discretionary", emoji: "🛍️", color: "#FF6B9D", rarity: "PINK DIAMOND", etf: "XLY", tag: "Retail, autos, travel, luxury" },
  { name: "Consumer Staples", emoji: "🛒", color: "#7BED9F", rarity: "EMERALD", etf: "XLP", tag: "Food, beverages, household" },
  { name: "Energy", emoji: "⛽", color: "#FFA502", rarity: "AMBER", etf: "XLE", tag: "Oil majors, drillers, pipelines" },
  { name: "Industrials", emoji: "🏗️", color: "#A4B0BE", rarity: "SILVER", etf: "XLI", tag: "Aerospace, machinery, defense" },
  { name: "Utilities", emoji: "⚡", color: "#70A1FF", rarity: "SAPPHIRE", etf: "XLU", tag: "Electric, gas, water" },
  { name: "Real Estate", emoji: "🏢", color: "#A55EEA", rarity: "AMETHYST", etf: "XLRE", tag: "REITs, logistics, towers" },
  { name: "Materials", emoji: "⛏️", color: "#CD7F32", rarity: "BRONZE", etf: "XLB", tag: "Chemicals, metals, mining" },
  { name: "Communication Services", emoji: "📡", color: "#FF6348", rarity: "ONYX", etf: "XLC", tag: "Media, telecom, social" },
  { name: "ETFs & Indexes", emoji: "📊", color: "#E8E8E8", rarity: "PLATINUM", etf: "ETF", tag: "Broad-market ETFs and indexes" },
];

let selectedSector = SECTORS[0];
let timerStr = "--:--:--";

// ===== MARKET TIMER =====
function updateTimer() {
  const now = new Date();
  const et = new Date(now.toLocaleString("en-US", { timeZone: "America/New_York" }));
  const day = et.getDay(), h = et.getHours(), m = et.getMinutes(), s = et.getSeconds();
  const mins = h * 60 + m;
  let label, isOpen, target;

  if (day >= 1 && day <= 5 && mins >= 570 && mins < 960) {
    label = "CLOSES IN"; isOpen = true;
    target = new Date(et); target.setHours(16, 0, 0, 0);
  } else {
    label = "OPENS IN"; isOpen = false;
    target = new Date(et);
    if (mins >= 960 || day === 0 || day === 6) {
      let d = 1;
      while (true) {
        const c = new Date(et); c.setDate(c.getDate() + d);
        if (c.getDay() >= 1 && c.getDay() <= 5) { target = c; break; }
        d++;
      }
    }
    target.setHours(9, 30, 0, 0);
  }

  const diff = Math.max(0, Math.floor((target - et) / 1000));
  const hh = String(Math.floor(diff / 3600)).padStart(2, '0');
  const mm = String(Math.floor((diff % 3600) / 60)).padStart(2, '0');
  const ss = String(diff % 60).padStart(2, '0');
  timerStr = `${hh}:${mm}:${ss}`;

  document.getElementById('marketTimer').textContent = timerStr;
  document.getElementById('marketLabel').textContent = label;
  const statusEl = document.getElementById('marketStatus');
  statusEl.textContent = isOpen ? "● MARKET OPEN" : "○ MARKET CLOSED";
  statusEl.className = "market-status " + (isOpen ? "open" : "closed");
  document.getElementById('ibTimerLabel').textContent = label;
  document.getElementById('ibTimer').textContent = timerStr;
  document.getElementById('ibTimer').style.color = selectedSector.color;
  document.getElementById('ibTimer').style.textShadow = `0 0 12px ${selectedSector.color}66`;

  // Update pack tile timers
  document.querySelectorAll('.pack-timer').forEach(el => el.textContent = timerStr);
}
setInterval(updateTimer, 1000);
updateTimer();

// ===== MARQUEE =====
function generatePulls() {
  const users = ["spartan23","tampaballer","coleG","courtside_kid","alpha_dog","buzzerbeater","fadeaway","BPM_king","diamondhands","draftnight","midrange_only","RJ_drips","bigmoney","rookie_szn","sharpshooter9"];
  const verbs = ["just analyzed","pulled","ran SHAQ on","compared","dominated with"];
  let items = [];
  for (let i = 0; i < 30; i++) {
    const u = users[Math.floor(Math.random() * users.length)];
    const s = SECTORS[Math.floor(Math.random() * SECTORS.length)];
    const v = verbs[Math.floor(Math.random() * verbs.length)];
    items.push(`@${u} ${v} from ${s.name} pack`);
  }
  const text = "🏀 RECENT SHAQ PULLS  ·  " + items.join("  •  ");
  document.getElementById('marqueeTrack').textContent = text + "  ·  " + text;
}
generatePulls();

// ===== PACK GRID =====
function selectSector(index) {
  selectedSector = SECTORS[index];
  const c = selectedSector.color;

  // Update featured pack
  document.getElementById('fpEmoji').textContent = selectedSector.emoji;
  document.getElementById('fpEmoji').style.filter = `drop-shadow(0 4px 20px ${c})`;
  document.getElementById('fpName').textContent = selectedSector.name.toUpperCase();
  document.getElementById('fpName').style.textShadow = `0 0 20px ${c}`;
  document.getElementById('fpRarity').textContent = selectedSector.rarity;
  document.getElementById('fpRarity').style.color = c;
  document.getElementById('fpRarity').style.textShadow = `0 0 10px ${c}`;

  const fp = document.getElementById('featuredPack');
  fp.style.background = `linear-gradient(150deg, ${c}55 0%, rgba(0,0,0,0.85) 55%, #000 100%)`;
  fp.style.border = `3px solid ${c}`;
  fp.style.boxShadow = `0 40px 80px rgba(0,0,0,0.9), 0 0 100px ${c}44, inset 0 2px 0 rgba(255,255,255,0.35)`;

  // Update info banner
  document.getElementById('ibName').textContent = `${selectedSector.emoji} ${selectedSector.name.toUpperCase()}`;
  document.getElementById('ibDesc').textContent = `${selectedSector.tag} · ETF: ${selectedSector.etf} · ${selectedSector.rarity}`;
  const ib = document.getElementById('infoBanner');
  ib.style.background = `linear-gradient(90deg, rgba(0,0,0,0.7), ${c}15, rgba(0,0,0,0.7))`;
  ib.style.borderTop = `2px solid ${c}55`;
  ib.style.borderBottom = `2px solid ${c}55`;

  // Update search input border
  document.getElementById('tickerInput').style.borderColor = `${c}55`;

  // Highlight selected tile
  document.querySelectorAll('.pack-tile').forEach((tile, i) => {
    const s = SECTORS[i];
    if (i === index) {
      tile.classList.add('selected');
      tile.style.border = `3px solid ${s.color}`;
      tile.style.boxShadow = `0 0 40px ${s.color}66, 0 15px 30px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.3)`;
    } else {
      tile.classList.remove('selected');
      tile.style.border = `2px solid rgba(255,255,255,0.1)`;
      tile.style.boxShadow = `0 8px 20px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.15)`;
    }
  });
}

function buildPackGrid() {
  const grid = document.getElementById('packGrid');
  grid.innerHTML = '';
  SECTORS.forEach((s, i) => {
    const tile = document.createElement('div');
    tile.className = 'pack-tile' + (i === 0 ? ' selected' : '');
    tile.style.background = `linear-gradient(145deg, ${s.color}44 0%, #0a0e2799 50%, #000000cc 100%)`;
    if (i === 0) {
      tile.style.border = `3px solid ${s.color}`;
      tile.style.boxShadow = `0 0 40px ${s.color}66, 0 15px 30px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.3)`;
    }
    tile.onclick = () => selectSector(i);
    tile.innerHTML = `
      <div class="info-dot">i</div>
      <div class="pack-emoji" style="filter:drop-shadow(0 2px 8px ${s.color}88)">${s.emoji}</div>
      <div class="pack-name">${s.name}</div>
      <div class="pack-rarity" style="color:${s.color}; text-shadow:0 0 8px ${s.color}88">${s.rarity}</div>
      <div class="pack-timer">${timerStr}</div>
    `;
    grid.appendChild(tile);
  });
}
buildPackGrid();

// ===== SEARCH + ANALYZE =====
document.getElementById('tickerInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') runAnalysis();
});

async function runAnalysis() {
  const ticker = document.getElementById('tickerInput').value.trim().toUpperCase();
  if (!ticker) return;

  const btn = document.getElementById('analyzeBtn');
  const errEl = document.getElementById('errorMsg');
  btn.disabled = true; btn.textContent = "...";
  errEl.style.display = "none";

  try {
    const res = await fetch(`${API_URL}/analyze`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        ticker, mode: document.getElementById('modeSelect').value,
        lookback: document.getElementById('lookbackSelect').value, n_peers: 15,
      }),
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || "Analysis failed");
    }
    const data = await res.json();
    showAnalysis(data);
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = "block";
  } finally {
    btn.disabled = false; btn.textContent = "ANALYZE";
  }
}

function pct(v) { return v != null ? (v * 100).toFixed(2) + "%" : "—"; }
function dec(v) { return v != null ? v.toFixed(2) : "—"; }

function buildTable(stocks, color) {
  if (stocks.length === 0) return `<div class="table-empty">No stocks in this category</div>`;
  let html = `<table class="data-table"><thead><tr>
    <th style="text-align:left">Ticker</th><th>E[R]</th><th>σ</th><th>β</th><th>Sharpe</th><th>α</th>
  </tr></thead><tbody>`;
  stocks.forEach(s => {
    html += `<tr>
      <td style="color:${color}">${s.ticker}</td>
      <td>${pct(s.expected_return)}</td><td>${pct(s.sigma)}</td>
      <td>${dec(s.beta)}</td><td>${dec(s.sharpe)}</td><td>${pct(s.alpha)}</td>
    </tr>`;
  });
  return html + "</tbody></table>";
}

function showAnalysis(data) {
  const c = data.sector.color;
  document.getElementById('marketView').style.display = 'none';
  const av = document.getElementById('analysisView');
  av.style.display = 'block';

  av.innerHTML = `
    <button class="back-btn" onclick="backToMarket()">← BACK TO MARKET</button>

    <div class="sector-badge" style="color:${c};
      background:linear-gradient(90deg, transparent, ${c}15, transparent);">
      ${data.sector.emoji} ${data.sector.name.toUpperCase()} · ${data.sector.rarity} · ETF: ${data.sector.etf}
    </div>

    <div class="target-hero" style="background:linear-gradient(135deg,${c}30,transparent);
      border:3px solid ${c}; box-shadow:0 0 60px ${c}33;">
      <div class="target-label" style="color:${c}">⭐ TARGET STOCK ⭐</div>
      <div class="target-ticker" style="text-shadow:0 0 30px ${c}44">${data.target.ticker}</div>
      <div class="target-sector">${data.sector.name.toUpperCase()}</div>
    </div>

    <div class="metrics-row">
      <div class="metric-card" style="border:1px solid ${c}44">
        <div class="metric-label">Expected Return</div>
        <div class="metric-value">${pct(data.target.expected_return)}</div>
      </div>
      <div class="metric-card" style="border:1px solid ${c}44">
        <div class="metric-label">Sigma (σ)</div>
        <div class="metric-value">${pct(data.target.sigma)}</div>
      </div>
      <div class="metric-card" style="border:1px solid ${c}44">
        <div class="metric-label">Beta (β)</div>
        <div class="metric-value">${dec(data.target.beta)}</div>
      </div>
      <div class="metric-card" style="border:1px solid ${c}44">
        <div class="metric-label">Sharpe</div>
        <div class="metric-value">${dec(data.target.sharpe)}</div>
      </div>
    </div>

    <div class="analysis-meta">
      Mode: <b>${data.mode}</b> · Lookback: <b>${data.lookback}</b> ·
      Benchmark: <b>${data.benchmark}</b> · Risk-free: <b>${pct(data.risk_free_rate)}</b> · Data: Yahoo Finance
    </div>

    <div class="tables-row">
      <div class="table-section">
        <div class="table-title">🟢 MORE DOMINANT <span class="table-count">(${data.more_dominant.length})</span></div>
        ${buildTable(data.more_dominant, "#7BED9F")}
      </div>
      <div class="table-section">
        <div class="table-title">⚪ NON-COMPARABLE <span class="table-count">(${data.non_comparable.length})</span></div>
        ${buildTable(data.non_comparable, "#a0aec0")}
      </div>
      <div class="table-section">
        <div class="table-title">🔴 LESS DOMINANT <span class="table-count">(${data.less_dominant.length})</span></div>
        ${buildTable(data.less_dominant, "#FF4757")}
      </div>
    </div>

    <div style="text-align:center; margin-bottom:40px;">
      <div style="font-size:11px; letter-spacing:3px; color:#4a5568; margin-bottom:10px;">RUN ANOTHER ANALYSIS</div>
      <div style="display:flex; gap:8px; max-width:400px; margin:0 auto;">
        <input id="tickerInput2" class="search-input" placeholder="TICKER" style="border-color:${c}55"
          onkeydown="if(event.key==='Enter')runAnalysis2()">
        <button class="search-btn" onclick="runAnalysis2()" style="border-color:${c}66;
          background:linear-gradient(135deg,${c}33,${c}18);">GO</button>
      </div>
      <div id="errorMsg2" class="error-msg" style="display:none"></div>
    </div>
  `;
}

async function runAnalysis2() {
  const ticker = document.getElementById('tickerInput2').value.trim().toUpperCase();
  if (!ticker) return;
  document.getElementById('tickerInput').value = ticker;
  const errEl = document.getElementById('errorMsg2');
  errEl.style.display = "none";
  try {
    const res = await fetch(`${API_URL}/analyze`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        ticker, mode: document.getElementById('modeSelect').value,
        lookback: document.getElementById('lookbackSelect').value, n_peers: 15,
      }),
    });
    if (!res.ok) { const err = await res.json(); throw new Error(err.detail || "Failed"); }
    const data = await res.json();
    showAnalysis(data);
    window.scrollTo(0, 0);
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = "block";
  }
}

function backToMarket() {
  document.getElementById('analysisView').style.display = 'none';
  document.getElementById('marketView').style.display = 'block';
  window.scrollTo(0, 0);
}

// Init
selectSector(0);
</script>
</body>
</html>
